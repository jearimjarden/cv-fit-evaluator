services:
  cv-fit-signal:
    build: .

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ./auth_config.yaml:/app/auth_config.yaml
      
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s